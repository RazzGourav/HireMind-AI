# ──────────────────────────────────────────────────────────────────────────────
# Skill Ontology — Hand-curated taxonomy of technical skills
# ──────────────────────────────────────────────────────────────────────────────
# Structure:
#   category:
#     canonical_name:
#       aliases: [list of alternative names]
#       parents: [list of parent categories]
#
# The parser and graph services load this file to:
#   1. Normalise raw skill strings → canonical names
#   2. Build a knowledge graph with is-a / part-of edges
#   3. Enable semantic reasoning beyond exact keyword matches
#
# To add a new technology (e.g. Qdrant, pgvector), simply add an entry
# under the appropriate category. No code changes required.
# ──────────────────────────────────────────────────────────────────────────────

