# ──────────────────────────────────────────────────────────────────────────────
# Technology Relationships — edges for the knowledge graph
# ──────────────────────────────────────────────────────────────────────────────
# Relation types: uses, depends_on, extends, alternative_to, related_to
# ──────────────────────────────────────────────────────────────────────────────
technology_relationships:
  FastAPI:
    uses: ["Python", "Pydantic"]
    alternative_to: ["Flask", "Django"]
  Flask:
    uses: ["Python"]
    alternative_to: ["FastAPI", "Django"]
  LangChain:
    uses: ["Python", "LLM"]
    depends_on: ["Embeddings", "Retrieval"]
  RAG:
    depends_on: ["LLM", "Retrieval", "Embeddings"]
    related_to: ["LangChain", "Vector Search"]
  LoRA:
    extends: ["Fine Tuning"]
    depends_on: ["LLM", "PyTorch"]
  QLoRA:
    extends: ["LoRA"]
    depends_on: ["LLM", "Quantization"]
  FAISS:
    alternative_to: ["Milvus", "Pinecone", "Qdrant", "Weaviate"]
    depends_on: ["Embeddings"]
  Milvus:
    alternative_to: ["FAISS", "Pinecone", "Qdrant", "Weaviate"]
    depends_on: ["Embeddings"]
  Pinecone:
    alternative_to: ["FAISS", "Milvus", "Qdrant", "Weaviate"]
    depends_on: ["Embeddings"]
  PyTorch:
    alternative_to: ["TensorFlow"]
    uses: ["Python"]
  TensorFlow:
    alternative_to: ["PyTorch"]
    uses: ["Python"]
  Spark:
    uses: ["Python", "Scala", "Java"]
    related_to: ["Kafka", "Airflow"]
  Kafka:
    related_to: ["Spark", "Airflow"]
  Docker:
    related_to: ["Kubernetes"]
  Kubernetes:
    depends_on: ["Docker"]
  Sentence Transformers:
    depends_on: ["PyTorch", "Transformers"]
    uses: ["Embeddings"]
  ColBERT:
    depends_on: ["Transformers"]
    related_to: ["Retrieval", "Dense Retrieval"]
  BGE:
    depends_on: ["Sentence Transformers"]
    related_to: ["Embeddings"]
  scikit-learn:
