# ──────────────────────────────────────────────────────────────────────────────
# Synonym Groups — bidirectional synonym resolution for recall improvement
# ──────────────────────────────────────────────────────────────────────────────
# Each group is a list of equivalent terms. The FIRST term in each group
# is treated as the canonical form. All terms in a group map to each other.
#
# To add a new synonym, add it to an existing group or create a new one.
# No code changes required.
# ──────────────────────────────────────────────────────────────────────────────

