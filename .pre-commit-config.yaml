repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: uv
        args: ["run", "black"]
        language: system
        types: [python]

      - id: ruff
        name: ruff
        entry: uv
        args: ["run", "ruff", "check", "--fix"]
        language: system
        types: [python]

      - id: isort
        name: isort
        entry: uv
        args: ["run", "isort"]
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: uv
        args: ["run", "mypy", "--explicit-package-bases", "src", "scripts"]
        language: system
        pass_filenames: false
        types: [python]
